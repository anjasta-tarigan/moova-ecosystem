
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOOVA - Global Science & Innovation Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              // Base Monochrome Scale (Replacing Slate with pure neutral grays)
              slate: {
                50: '#F9FAFB',
                100: '#F3F4F6',
                200: '#E5E7EB',
                300: '#D1D5DB',
                400: '#9CA3AF',
                500: '#6B7280',
                600: '#4B5563',
                700: '#374151',
                800: '#1F2937',
                900: '#111827', // Deep Black-Gray
                950: '#030712', // Near Black
              },
              // Primary UI Actions -> STRICTLY MONOCHROME (Black/Dark Gray)
              primary: {
                50: '#F3F4F6',  // Light Gray
                100: '#E5E7EB', // Gray
                200: '#D1D5DB',
                300: '#9CA3AF',
                400: '#6B7280',
                500: '#111827', // Button Default (Near Black)
                600: '#000000', // Button Hover (Pure Black)
                700: '#374151',
                800: '#1F2937',
                900: '#000000', // Hero Backgrounds
                950: '#000000',
              },
              // Secondary UI -> STRICTLY MONOCHROME (Medium Grays)
              secondary: {
                50: '#F9FAFB',
                100: '#F3F4F6',
                200: '#E5E7EB',
                500: '#6B7280', // Secondary Button (Gray)
                600: '#4B5563',
                700: '#374151',
                900: '#111827',
              },
              // Semantic Colors -> MONOCHROME MAPPING (Status shouldn't rely on color)
              // We map these to grays to enforce the rule "Colors must not indicate status" in buttons/text
              emerald: { 
                50: '#F9FAFB', 100: '#F3F4F6', 500: '#111827', 600: '#000000', 700: '#374151', 800: '#1F2937' 
              },
              red: { 
                50: '#F9FAFB', 100: '#F3F4F6', 500: '#111827', 600: '#000000', 700: '#374151', 800: '#1F2937' 
              },
              amber: { 
                50: '#F9FAFB', 100: '#F3F4F6', 500: '#111827', 600: '#000000', 700: '#374151', 800: '#1F2937' 
              },
              blue: { 
                50: '#F9FAFB', 100: '#F3F4F6', 500: '#111827', 600: '#000000', 700: '#374151' 
              },
              // Brand Accents -> STRICTLY FOR ATMOSPHERE / BACKGROUNDS
              accent: {
                cyan: '#00BBFF',
                green: '#00A86B',
                crimson: '#DC143C',
                amber: '#FFBF00',
                orange: '#FF8C00',
                blue: '#0052CC',
              }
            },
            backgroundImage: {
              // Monochrome Gradients for Buttons/Text
              'brand-gradient': 'linear-gradient(to bottom right, #1F2937, #000000)', 
              'brand-gradient-hover': 'linear-gradient(to bottom right, #000000, #000000)',
              // Atmospheric Gradients (Subtle)
              'atmosphere-cyan': 'radial-gradient(circle at center, rgba(0, 187, 255, 0.15) 0%, transparent 70%)',
              'atmosphere-mix': 'linear-gradient(120deg, rgba(0, 187, 255, 0.05), rgba(220, 20, 60, 0.05))',
            },
            animation: {
              'float': 'float 8s ease-in-out infinite',
              'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'spin-slow': 'spin 12s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0) scale(1)' },
                '50%': { transform: 'translateY(-20px) scale(1.05)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        scroll-behavior: smooth;
        background-color: #FFFFFF;
        color: #111827;
      }
      
      /* Editorial Typography */
      h1, h2, h3, h4, h5, h6 {
        letter-spacing: -0.03em;
      }

      /* Premium Textures */
      .bg-grid-pattern {
        background-size: 60px 60px;
        background-image: linear-gradient(to right, rgba(0, 0, 0, 0.03) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
        mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
        -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
      }

      .bg-grid-pattern-dark {
        background-size: 60px 60px;
        background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
        -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
      }
      
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }

      /* Atmospheric Glows */
      .glow-cyan {
        background: radial-gradient(circle, rgba(0, 187, 255, 0.15) 0%, transparent 70%);
      }
      .glow-crimson {
        background: radial-gradient(circle, rgba(220, 20, 60, 0.12) 0%, transparent 70%);
      }
      .glow-amber {
        background: radial-gradient(circle, rgba(255, 191, 0, 0.12) 0%, transparent 70%);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-white text-slate-900 antialiased selection:bg-slate-200 selection:text-black">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
